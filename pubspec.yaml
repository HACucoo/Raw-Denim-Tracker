name: raw_denim_tracker
description: Track wear days and washes for raw denim and other garments.
publish_to: 'none'
version: 1.2.2+9

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Database
  sqflite: ^2.3.2
  path: ^1.9.0

  # State management
  flutter_riverpod: ^3.3.1

  # Navigation
  go_router: ^17.1.0

  # Google auth & Sheets
  google_sign_in: ^6.2.1
  googleapis: ^16.0.0
  googleapis_auth: ^2.0.0
  http: ^1.2.1

  # Images
  image_picker: ^1.1.2
  image_cropper: ^12.1.0
  cached_network_image: ^3.3.1

  # NFC
  nfc_manager: ^4.1.1

  # Android widget
  home_widget: ^0.9.0

  # Utilities
  uuid: ^4.4.0
  intl: ^0.20.2
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  share_plus: ^12.0.1
  file_picker: ^10.3.10
  permission_handler: ^12.0.1
  geolocator: ^13.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
